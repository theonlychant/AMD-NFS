name: Python ML Package CI

on:
  push:
    paths:
      - 'py/**'
  pull_request:
    paths:
      - 'py/**'

jobs:
  tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install package (editable)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e py
      - name: Install test deps
        run: pip install pytest
      - name: Run tests
        run: pytest -q py/tests

  ml-extras:
    name: ML extras (optional)
    runs-on: ubuntu-latest
    needs: tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install package with ML extras
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e "py[ml]"
      - name: Run tests with extras
        run: |
          pip install pytest
          pytest -q py/tests
